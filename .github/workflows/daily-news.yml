name: 每日自动发布公司新闻

on:
  # 每天北京时间早上9点自动执行（UTC时间1点）
  schedule:
    - cron: '0 1 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  publish-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 生成今日新闻
        run: python generate_news.py

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.html
          git diff --staged --quiet || (git commit -m "📝 自动发布公司新闻 $(date '+%Y-%m-%d')" && git push)
          echo "新闻发布完成！"
