<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>浦北装修设计-智能家居-全屋定制</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0">

    <!-- Preconnect for external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Font (display=swap already used in original) -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet">

    <!-- Critical CSS: preload then apply (minified generated by CI) -->
    <link rel="preload" href="/style.min.css" as="style">
    <link rel="stylesheet" href="/style.min.css">

    <!-- Preload hero image in webp (will be generated by CI) -->
    <link rel="preload" as="image" href="/image/15.webp">

    <!-- Load production React builds (deferred to avoid blocking) -->
    <script defer src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script defer src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>

    <!-- Small utility libs (defer) -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/classnames/2.3.1/index.min.js"></script>

    <!-- Font Awesome kit (defer) -->
    <script defer src="https://kit.fontawesome.com/dafc7c6349.js" crossorigin="anonymous"></script>

    <!-- Meta for performance -->
    <meta http-equiv="x-dns-prefetch-control" content="on">
    <link rel="dns-prefetch" href="//fonts.googleapis.com">

  </head>
    
  <body>
  <div id="root"></div>

    <!-- Lazyloader for images/backgrounds (small) -->
    <script defer src="/lazyload.js"></script>

    <!-- Minified app bundle (generated by CI) -->
    <script defer src="/script.min.js"></script>

  </body>
  
</html>
